<!DOCTYPE html>
<html>
<head>
    <title>Bynx vs Toby</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #game { position: relative; width: 100vw; height: 100vh; background: #87CEEB; }
        .character { position: absolute; width: 50px; height: 50px; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        const gameDiv = document.getElementById('game');
        const player = document.createElement('div');
        player.classList.add('character');
        player.style.backgroundColor = 'red';
        gameDiv.appendChild(player);
        let x = 0, y = 0;

        function updatePosition() {
            player.style.left = x + 'px';
            player.style.bottom = y + 'px';
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight') x += 10;
            if (event.key === 'ArrowLeft') x -= 10;
            if (event.key === 'ArrowUp') y += 10;
            if (event.key === 'ArrowDown') y -= 10;
            updatePosition();
        });
    </script>
</body>
</html>
