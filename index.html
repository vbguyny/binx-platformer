<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binx Platformer</title>
    <style>
        body { margin: 0; }
        canvas { display: block; margin: auto; background-color: #cceeff; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); }
        .button { margin: 5px; padding: 10px; background-color: #fff; border: 1px solid #aaa; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="controls">
        <div class="button" id="left">Left</div>
        <div class="button" id="right">Right</div>
        <div class="button" id="jump">Jump</div>
        <div class="button" id="hide">Hide</div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let binx = { x: 50, y: 300, width: 32, height: 32, hidden: false };
        let toby = { x: 700, y: 270, width: 50, height: 50 };
        let level = 1;  
        let fishCollected = 0;
        const keys = {};

        // Key controls for PC
        window.addEventListener('keydown', (event) => {
            keys[event.key] = true;
        });

        window.addEventListener('keyup', (event) => {
            keys[event.key] = false;
        });

        // Onscreen controls for mobile
        document.getElementById('left').addEventListener('click', () => keys['ArrowLeft'] = true);
        document.getElementById('right').addEventListener('click', () => keys['ArrowRight'] = true);
        document.getElementById('jump').addEventListener('click', () => keys[' ']= true);
        document.getElementById('hide').addEventListener('click', () => keys['H'] = true);

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (keys['ArrowLeft'] || keys['a']) {
                binx.x -= 3;
            }
            if (keys['ArrowRight'] || keys['d']) {
                binx.x += 3;
            }
            if (keys[' '] && !binx.hidden) {
                binx.y -= 60; // Jump
            }
            if (keys['H']) {
                binx.hidden = !binx.hidden; // Hide
                keys['H'] = false;
            }
            // Collision detection and collectibles logic goes here
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw Binx
            ctx.fillStyle = binx.hidden ? 'transparent' : 'black';
            ctx.fillRect(binx.x, binx.y, binx.width, binx.height);
            // Draw Toby
            ctx.fillStyle = 'brown';
            ctx.fillRect(toby.x, toby.y, toby.width, toby.height);
            // Additional drawing logic (levels, fish, etc.) goes here
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
